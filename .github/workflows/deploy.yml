name: Deploy & Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # 1. Deploy to Cloudflare Pages
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=edubrain

  # 2. Build APK (only on tags)
  build-apk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle
        run: |
          cd android
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.VERSION }}\"/" app/build.gradle
          # Increment versionCode
          CURRENT_CODE=$(grep 'versionCode' app/build.gradle | head -1 | tr -dc '0-9')
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" app/build.gradle

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.5

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          cd android
          # Use debug keystore for now - replace with release keystore in production
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="app/build/outputs/apk/release/EduBrain-v${{ steps.version.outputs.VERSION }}.apk"

          # Align
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK" "${APK}.aligned"

          # Sign
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out "$SIGNED_APK" \
            "${APK}.aligned"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/release/EduBrain-*.apk

  # 3. Create GitHub Release (only on tags)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-web, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: ./dist

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EduBrain v${{ steps.version.outputs.VERSION }}"
          body: |
            ## EduBrain v${{ steps.version.outputs.VERSION }}

            ### 변경사항
            - 자동 릴리스

            ### 설치 방법
            **Android**: 아래 APK 파일을 다운로드하여 설치하세요.
            **iOS/웹**: [EduBrain 웹앱](https://edubrain.pages.dev)에서 "홈 화면에 추가"로 PWA 설치하세요.

            ### 업데이트
            앱 실행 시 자동으로 새 버전을 감지합니다.
          files: ./dist/EduBrain-*.apk
          draft: false
          prerelease: false
